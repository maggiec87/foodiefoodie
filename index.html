<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今天吃什么？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e14;
  --surface: #17171f;
  --surface2: #1e1e2a;
  --border: rgba(255,255,255,0.08);
  --text: #f0eef8;
  --muted: rgba(240,238,248,0.45);
  --accent: #a78bfa;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 48px;
}

.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d) infinite ease-in-out;
  opacity: 0;
}
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.8); }
  50% { opacity: var(--o); transform: scale(1); }
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px;
}

.header {
  text-align: center;
  padding: 36px 0 20px;
}
.header h1 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: clamp(28px, 8vw, 38px);
  letter-spacing: 2px;
  line-height: 1.2;
  background: linear-gradient(135deg, #f0eef8 30%, #a78bfa 70%, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  margin-top: 6px;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.wheel-wrap {
  position: relative;
  width: min(320px, 86vw);
  height: min(320px, 86vw);
  margin: 0 auto 8px;
}

.wheel-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
  pointer-events: none;
  transition: background 0.5s;
}
.wheel-glow.active {
  background: radial-gradient(circle, rgba(167,139,250,0.4) 0%, transparent 70%);
  animation: pulse-glow 0.8s ease-in-out infinite alternate;
}
@keyframes pulse-glow {
  from { transform: scale(0.95); }
  to   { transform: scale(1.05); }
}

.pointer {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 0 8px rgba(251,191,36,0.9));
}

#wheelCanvas {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  cursor: pointer;
  display: block;
  box-shadow:
    0 0 0 3px rgba(167,139,250,0.3),
    0 20px 60px rgba(0,0,0,0.5);
}

.spin-btn {
  display: block;
  margin: 18px auto 0;
  padding: 14px 52px;
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: #0e0e14;
  background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
  background-size: 200% 200%;
  border: none;
  border-radius: 99px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(167,139,250,0.35), 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.15s, opacity 0.15s;
  animation: grad-shift 3s ease infinite;
}
@keyframes grad-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.spin-btn:active   { transform: scale(0.95); }
.spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.result-area {
  margin: 20px 0 0;
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.result-card {
  background: var(--surface);
  border: 1px solid rgba(167,139,250,0.25);
  border-radius: 20px;
  padding: 14px 32px;
  text-align: center;
  opacity: 0;
  transform: translateY(10px) scale(0.95);
  transition: opacity 0.4s, transform 0.4s;
}
.result-card.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.result-emoji { font-size: 28px; margin-bottom: 4px; }
.result-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.result-name {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: clamp(22px, 6vw, 28px);
  margin-top: 2px;
  background: linear-gradient(135deg, #f0eef8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.divider {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin: 28px 0 0;
}

.menu-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  letter-spacing: 0.5px;
}
.menu-toggle:active { opacity: 0.7; }
.toggle-left { display: flex; align-items: center; gap: 8px; }
.toggle-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.toggle-arrow {
  font-size: 10px;
  transition: transform 0.3s;
}
.toggle-arrow.open { transform: rotate(180deg); }

.menu-panel {
  width: 100%;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.menu-panel.open { max-height: 600px; }

.menu-inner { padding-bottom: 8px; }

.menu-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.menu-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px 6px 14px;
  border-radius: 99px;
  font-size: 13px;
  border: 1px solid transparent;
}

.chip-del {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
  transition: background 0.15s, color 0.15s;
}
.chip-del:active {
  background: rgba(244,63,94,0.3);
  color: #f472b6;
}

.add-row { display: flex; gap: 8px; }

.add-input {
  flex: 1;
  padding: 11px 14px;
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.add-input::placeholder { color: rgba(240,238,248,0.25); }
.add-input:focus { border-color: rgba(167,139,250,0.5); }

.add-btn {
  padding: 11px 18px;
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 12px;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.add-btn:active { background: rgba(167,139,250,0.25); }

.hint {
  text-align: center;
  font-size: 11px;
  color: rgba(240,238,248,0.2);
  margin-top: 12px;
  letter-spacing: 0.3px;
}

.confetti-piece {
  position: fixed;
  width: 8px; height: 8px;
  pointer-events: none;
  z-index: 999;
  animation: confetti-fall var(--dur) ease-in forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="page">
  <div class="header">
    <h1>今天吃什么？</h1>
    <p>转动命运之轮，让宇宙替你决定</p>
  </div>

  <div class="wheel-wrap">
    <div class="wheel-glow" id="wheelGlow"></div>
    <div class="pointer">
      <svg width="28" height="36" viewBox="0 0 28 36">
        <polygon points="14,36 1,4 27,4" fill="#fbbf24"/>
        <polygon points="14,30 5,8 23,8" fill="#fde68a" opacity="0.6"/>
      </svg>
    </div>
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()"> 转啊转 </button>

  <div class="result-area">
    <div class="result-card" id="resultCard">
      <div class="result-emoji" id="resultEmoji">🍽️</div>
      <div class="result-label">今天就吃</div>
      <div class="result-name" id="resultName"></div>
    </div>
  </div>

  <div class="divider"></div>

  <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">
    <div class="toggle-left">
      <span class="toggle-dot"></span>
      <span>菜单设置 · <span id="menuCountText">9 项</span></span>
    </div>
    <span class="toggle-arrow" id="toggleArrow">▼</span>
  </button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-inner">
      <div class="menu-grid" id="menuGrid"></div>
      <div class="add-row">
        <input class="add-input" id="addInput" placeholder="添加新菜，如：红烧肉" maxlength="12" />
        <button class="add-btn" onclick="addItem()">添加</button>
      </div>
      <p class="hint">至少保留 2 项</p>
    </div>
  </div>
</div>

<script>
var PALETTES = [
  { arc:'#312e81', text:'#c7d2fe', light:'#1e1b4b' },
  { arc:'#134e4a', text:'#99f6e4', light:'#0f3d39' },
  { arc:'#7c2d12', text:'#fed7aa', light:'#5c2008' },
  { arc:'#831843', text:'#fbcfe8', light:'#611232' },
  { arc:'#1e3a5f', text:'#bae6fd', light:'#162d48' },
  { arc:'#365314', text:'#d9f99d', light:'#263d0e' },
  { arc:'#78350f', text:'#fde68a', light:'#5a2608' },
  { arc:'#4a044e', text:'#f5d0fe', light:'#370336' },
  { arc:'#1c3a2a', text:'#86efac', light:'#12281c' },
];

var items = [
  ['螺蛳粉',   '🍜'],
  ['酸菜鱼',   '🐟'],
  ['手撕鸡',   '🍗'],
  ['烧鸡',     '🍗'],
  ['清蒸鲈鱼', '🐠'],
  ['辣椒炒肉', '🌶️'],
  ['蒸排骨',   '🥩'],
  ['通心粉',   '🍝'],
  ['焖饭',     '🍚'],
];

var spinning = false;
var angle = 0;
var menuOpen = false;

/* 星星 */
(function() {
  var c = document.getElementById('stars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random() * 2 + 1;
    s.style.cssText =
      'width:' + sz + 'px;height:' + sz + 'px;' +
      'left:' + (Math.random() * 100) + '%;' +
      'top:' + (Math.random() * 100) + '%;' +
      '--d:' + (2 + Math.random() * 4) + 's;' +
      '--o:' + (0.3 + Math.random() * 0.5) + ';' +
      'animation-delay:' + (Math.random() * 4) + 's;';
    c.appendChild(s);
  }
})();

/* 画转盘 */
var canvas = document.getElementById('wheelCanvas');
var ctx = canvas.getContext('2d');

function drawWheel() {
  var W = 600, H = 600, cx = 300, cy = 300, r = 284;
  ctx.clearRect(0, 0, W, H);

  var n = items.length;
  var slice = Math.PI * 2 / n;
  var emojiSz = n > 8 ? 20 : 24;
  var nameSz  = n > 8 ? 22 : 26;

  for (var i = 0; i < n; i++) {
    var pal     = PALETTES[i % PALETTES.length];
    var start   = angle + i * slice - Math.PI / 2;
    var end     = start + slice;
    var name    = items[i][0];
    var emoji   = items[i][1];
    var display = name.length > 5 ? name.slice(0, 4) + '…' : name;

    /* 扇形 */
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = pal.light;
    ctx.fill();
    ctx.strokeStyle = pal.arc;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    /* 分割线 */
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(start), cy + r * Math.sin(start));
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    /* emoji + 菜名 */
    var mid = start + slice / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(mid);
    ctx.textAlign = 'right';

    ctx.font = emojiSz + 'px serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, r - 16, -12);

    ctx.font = '500 ' + nameSz + 'px "Noto Sans SC", sans-serif';
    ctx.fillStyle = pal.text;
    ctx.textBaseline = 'middle';
    ctx.fillText(display, r - 16, 14);

    ctx.restore();
  }

  /* 中心圆 */
  var hg = ctx.createRadialGradient(cx, cy - 4, 0, cx, cy, 44);
  hg.addColorStop(0, '#2d2a4e');
  hg.addColorStop(1, '#1a1728');
  ctx.beginPath();
  ctx.arc(cx, cy, 44, 0, Math.PI * 2);
  ctx.fillStyle = hg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(167,139,250,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#f0eef8';
  ctx.font = '500 22px "ZCOOL XiaoWei", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('转', cx, cy);
}

canvas.addEventListener('click', spin);

/* 旋转 */
function spin() {
  if (spinning || items.length < 2) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('wheelGlow').classList.add('active');

  var extra = Math.PI * 2 * (6 + Math.random() * 6) + Math.random() * Math.PI * 2;
  var dur   = 4000 + Math.random() * 1500;
  var t0    = performance.now();
  var a0    = angle;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    var t = Math.min((now - t0) / dur, 1);
    angle = a0 + extra * ease(t);
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('wheelGlow').classList.remove('active');
      showResult();
    }
  }
  requestAnimationFrame(frame);
}

function getWinner() {
  var n    = items.length;
  var sl   = Math.PI * 2 / n;
  var norm = ((-angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  return items[Math.floor(norm / sl) % n];
}

function showResult() {
  var w = getWinner();
  document.getElementById('resultEmoji').textContent = w[1];
  document.getElementById('resultName').textContent  = w[0];
  document.getElementById('resultCard').classList.add('show');
  launchConfetti();
}

/* 彩纸 */
function launchConfetti() {
  var colors = ['#a78bfa','#f472b6','#fbbf24','#34d399','#60a5fa','#fb7185'];
  var bx = window.innerWidth / 2;
  var by = window.innerHeight * 0.45;
  for (var i = 0; i < 50; i++) {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    var a   = Math.random() * Math.PI * 2;
    var spd = 80 + Math.random() * 120;
    el.style.cssText =
      'left:' + (bx + Math.cos(a) * spd - 4) + 'px;' +
      'top:' + by + 'px;' +
      'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
      '--dur:' + (1.2 + Math.random()) + 's;' +
      'animation-delay:' + (Math.random() * 0.3) + 's;' +
      'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';';
    document.body.appendChild(el);
    (function(e) { setTimeout(function() { e.remove(); }, 3000); })(el);
  }
}

/* 菜单 */
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('menuPanel').classList.toggle('open', menuOpen);
  document.getElementById('toggleArrow').classList.toggle('open', menuOpen);
}

function renderMenu() {
  var grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  for (var i = 0; i < items.length; i++) {
    var pal  = PALETTES[i % PALETTES.length];
    var chip = document.createElement('div');
    chip.className = 'menu-chip';
    chip.style.cssText = 'background:' + pal.light + ';border-color:' + pal.arc + ';color:' + pal.text + ';';
    chip.innerHTML =
      '<span>' + items[i][1] + ' ' + items[i][0] + '</span>' +
      '<button class="chip-del" onclick="removeItem(' + i + ')">×</button>';
    grid.appendChild(chip);
  }
  document.getElementById('menuCountText').textContent = items.length + ' 项';
  drawWheel();
}

var EMOJI_MAP = [
  ['排骨','🥩'],['螺蛳','🍜'],['拉面','🍜'],['寿司','🍣'],['沙拉','🥗'],
  ['汉堡','🍔'],['比萨','🍕'],['饺子','🥟'],
  ['粉','🍜'],['面','🍝'],['饭','🍚'],['鱼','🐟'],['虾','🦐'],['蟹','🦀'],
  ['鸡','🍗'],['鸭','🍖'],['肉','🥩'],['猪','🥓'],['牛','🥩'],
  ['锅','🍲'],['汤','🥣'],['饼','🫓'],['包','🥙'],['卷','🌯'],
  ['炒','🍳'],['蒸','♨️'],['烤','🔥'],['辣','🌶️'],['酸','🍋']
];

function guessEmoji(name) {
  for (var j = 0; j < EMOJI_MAP.length; j++) {
    if (name.indexOf(EMOJI_MAP[j][0]) !== -1) return EMOJI_MAP[j][1];
  }
  return '🍽️';
}

function addItem() {
  var inp = document.getElementById('addInput');
  var val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  for (var i = 0; i < items.length; i++) {
    if (items[i][0] === val) { inp.focus(); return; }
  }
  items.push([val, guessEmoji(val)]);
  inp.value = '';
  renderMenu();
}

function removeItem(idx) {
  if (items.length <= 2) return;
  items.splice(idx, 1);
  renderMenu();
}

document.getElementById('addInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addItem();
});

renderMenu();
</script>
</body>
</html>
